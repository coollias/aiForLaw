<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件翻译 — AI 法律小助手</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/translate.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <div id="app-page" class="app-page">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">⚖️ 法律小助手</span>
            </div>

            <div class="session-list-wrapper">
                <div class="session-list-header">
                    <span>💬 对话列表</span>
                    <button id="new-session-btn" class="new-session-btn" title="新建对话">+</button>
                </div>
                <div class="session-list" id="session-list">
                    <!-- 动态填充 -->
                </div>
            </div>

            <nav class="scene-nav">
                <button class="scene-btn" data-scene="general" onclick="location.href='/'">
                    <span class="scene-icon">💬</span>
                    <span class="scene-text">法律问答</span>
                </button>
                <button class="scene-btn" data-scene="document" onclick="location.href='/document'">
                    <span class="scene-icon">📝</span>
                    <span class="scene-text">写文书</span>
                </button>
                <button class="scene-btn" data-scene="research" onclick="location.href='/research'">
                    <span class="scene-icon">📚</span>
                    <span class="scene-text">查法规/案例</span>
                </button>
                <button class="scene-btn active" data-scene="translate">
                    <span class="scene-icon">🌐</span>
                    <span class="scene-text">文件翻译</span>
                </button>
                <button class="scene-btn" data-scene="contract" onclick="location.href='/'">
                    <span class="scene-icon">📋</span>
                    <span class="scene-text">审查合同</span>
                </button>
                <button class="scene-btn" data-scene="hallucination" onclick="location.href='/'">
                    <span class="scene-icon">✓</span>
                    <span class="scene-text">幻觉校验</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="footer-btn">🚪 退出</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content translate-page">
            <!-- 顶部工具栏 -->
            <header class="translate-toolbar">
                <div class="translate-toolbar-left">
                    <h1 class="translate-title">🌐 文件翻译</h1>
                    <p class="translate-subtitle">上传 PDF / DOCX / TXT，左右对照阅读，点击段落联动跳转</p>
                </div>
                <div class="translate-toolbar-right">
                    <button class="btn-secondary" id="history-btn">📋 历史记录</button>
                    <button class="btn-secondary" id="back-to-chat-btn" onclick="location.href='/'">← 返回对话</button>
                </div>
            </header>

            <!-- 操作栏 -->
            <div class="translate-actions">
                <!-- 文件上传 -->
                <label class="translate-upload-zone" id="upload-zone">
                    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt,.md" hidden>
                    <span class="upload-icon-large">📄</span>
                    <div class="upload-text">
                        <strong>点击上传或拖拽文件到这里</strong>
                        <small>支持 PDF / DOCX / TXT / Markdown，最大 50MB</small>
                    </div>
                </label>

                <!-- 语言选择 -->
                <div class="translate-lang-selectors">
                    <div class="lang-field">
                        <label for="source-lang">源语言</label>
                        <select id="source-lang">
                            <option value="auto">自动检测</option>
                            <option value="中文">中文</option>
                            <option value="英文">英文</option>
                            <option value="日文">日文</option>
                            <option value="韩文">韩文</option>
                            <option value="法文">法文</option>
                            <option value="德文">德文</option>
                            <option value="西班牙文">西班牙文</option>
                            <option value="俄文">俄文</option>
                            <option value="葡萄牙文">葡萄牙文</option>
                        </select>
                    </div>
                    <span class="lang-arrow">→</span>
                    <div class="lang-field">
                        <label for="target-lang">目标语言</label>
                        <select id="target-lang">
                            <option value="中文" selected>中文</option>
                            <option value="英文">英文</option>
                            <option value="日文">日文</option>
                            <option value="韩文">韩文</option>
                            <option value="法文">法文</option>
                            <option value="德文">德文</option>
                            <option value="西班牙文">西班牙文</option>
                            <option value="俄文">俄文</option>
                            <option value="葡萄牙文">葡萄牙文</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="translate-btn" disabled>开始翻译</button>
                </div>

                <!-- 文件信息 -->
                <div id="file-info" class="translate-file-info hidden">
                    <span id="file-name-display"></span>
                    <span id="block-count"></span>
                </div>

                <!-- 进度条 -->
                <div id="progress-area" class="translate-progress hidden">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="progress-text">翻译中 0/0 块</span>
                </div>

                <!-- 导出按钮 -->
                <div id="export-area" class="translate-export-area hidden">
                    <button class="btn-primary" id="export-docx-btn">📄 导出 Word</button>
                    <button class="btn-secondary" id="export-txt-btn">📃 导出纯文本</button>
                </div>
            </div>

            <!-- 左右对照阅读区 -->
            <div class="translate-view" id="translate-view">
                <!-- 左栏：原文 -->
                <section class="translate-panel" id="source-panel">
                    <div class="panel-header">
                        <span class="panel-label">原文</span>
                        <span id="source-lang-label" class="panel-lang"></span>
                    </div>
                    <div class="panel-content" id="source-content">
                        <div class="empty-panel">上传文件后这里将显示原文</div>
                    </div>
                </section>

                <!-- 拖拽分隔线 -->
                <div class="translate-divider" id="translate-divider"></div>

                <!-- 右栏：译文 -->
                <section class="translate-panel" id="target-panel">
                    <div class="panel-header">
                        <span class="panel-label">译文</span>
                        <span id="target-lang-label" class="panel-lang"></span>
                    </div>
                    <div class="panel-content" id="target-content">
                        <div class="empty-panel">翻译完成后这里将显示译文</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- 历史记录弹窗 -->
    <div id="history-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 id="doc-modal-title">📋 翻译历史</h2>
            <div class="modal-body" id="history-list" style="max-height:60vh;overflow-y:auto;">
                <!-- 动态填充 -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="document.getElementById('history-modal').classList.add('hidden')">关闭</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.mjs";
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.mjs";
        window.pdfjsLib = pdfjsLib;
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/translate.js"></script>
</body>
</html>
